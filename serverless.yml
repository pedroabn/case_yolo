# serverless.yml
service: yolo-coliving-api

provider:
  name: aws
  runtime: python3.11
  region: us-east-2
  environment:
    TABLE_NAME: case_yolo
    EVENT_BUS_NAME: ${self:service}-bus
  iam:
    role:
      statements:
        # DynamoDB — todos os Lambdas precisam
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [PeopleTable, Arn]
            - Fn::Join:
                - "/"
                - - Fn::GetAtt: [PeopleTable, Arn]
                  - "index/*"
        # EventBridge — apenas publisher_lambda precisa publicar eventos
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - Fn::GetAtt: [PeopleBus, Arn]

functions:
  # GET /api/people e GET /api/people/{id}
  # Síncrono — não passa pelo EventBridge
  readerHandler:
    handler: reader_lambda.lambda_handler
    description: "Leitura síncrona de pessoas no DynamoDB"
    # Adicionando a pasta dep ao pacote desta função
    package:
      include:
        - backend/dep/**
    events:
      - http:
          path: api/people
          method: get
          cors: true
      - http:
          path: api/people/{id}
          method: get
          cors: true

  # POST / PUT / DELETE — publica evento no EventBridge e retorna 202
  publisherHandler:
    handler: publisher_lambda.lambda_handler
    description: "Publica eventos de CRUD no EventBridge"
    # Adicionando a pasta dep ao pacote desta função
    package:
      include:
        - backend/dep/**
    events:
      - http:
          path: api/people
          method: post
          cors: true
      - http:
          path: api/people/{id}
          method: put
          cors: true
      - http:
          path: api/people/{id}
          method: delete
          cors: true
      - http:
          path: api/import
          method: post
          cors: true

  # Ativado pelo EventBridge — nunca chamado diretamente pelo API Gateway
  crudHandler:
    handler: crud_lambda.lambda_handler
    description: "Executa operações CRUD no DynamoDB via eventos do EventBridge"
    # Adicionando a pasta dep ao pacote desta função
    package:
      include:
        - backend/dep/**
    events:
      - eventBridge:
          eventBus: !Ref PeopleBus
          pattern:
            source:
              - yolo.people
            detail-type:
              - person.created
              - person.updated
              - person.deleted
              - people.imported

resources:
  Resources:
    # Bus customizado para eventos de pessoas
    PeopleBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:provider.environment.EVENT_BUS_NAME}

    # Tabela DynamoDB com dois GSIs
    PeopleTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
          - AttributeName: tipo
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: EmailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: TipoIndex
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
            Projection:
              ProjectionType: ALL

  # Outputs úteis após deploy
  Outputs:
    ApiGatewayUrl:
      Description: "URL base do API Gateway"
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: ApiGatewayRestApi
            - ".execute-api.${self:provider.region}.amazonaws.com/dev"
    EventBusArn:
      Description: "ARN do EventBridge Bus"
      Value:
        Fn::GetAtt: [PeopleBus, Arn]
    DynamoTableName:
      Description: "Nome da tabela DynamoDB"
      Value: ${self:provider.environment.TABLE_NAME}