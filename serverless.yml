service: yolo-coliving-api

package:
  individually: true
  patterns:
    - "!node_modules/"
    - "!src/"
    - "!.env*"
    - "!.md"
    - "!dockerfile"
    - "!docker-compose*"
    - "!package*.json"
    - "!tsconfig*"
    - "!vite.config*"
    - "!index.html"
    - "!app.py"
    - "!requirements.txt"
    - "!__pycache__/"
    - "!*.pyc"
    - "!lambda_function.py"

provider:
  name: aws
  runtime: python3.11
  region: us-east-2

  environment:
    DYNAMODB_TABLE_NAME: case_yolo
    EVENT_BUS_NAME: yolo-api-bus
    API_YOLO: ${env:API_YOLO}
    LOCAL_SYNC: ${env:LOCAL_SYNC}

  iam:
    role:
      statements:

        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/case_yolo"
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/case_yolo/index/*"

        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - Fn::GetAtt: [YoloApiBus, Arn]

        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"

functions:

  readerHandler:
    handler: backend/reader_lambda.lambda_handler
    memorySize: 256

    package:
      patterns:
        - backend/reader_lambda.py
        - backend/import_lambda.py
        - backend/__init__.py

    events:

      - http:
          path: api/people
          method: get
          cors:
            origins:
              - "*"
            headers:
              - Content-Type
              - Authorization

      - http:
          path: api/people/{id}
          method: get
          cors:
            origins:
              - "*"
            headers:
              - Content-Type
              - Authorization


  publisherHandler:
    handler: backend/publisher_lambda.lambda_handler
    memorySize: 256

    package:
      patterns:
        - backend/publisher_lambda.py
        - backend/crud_lambda.py
        - backend/import_lambda.py
        - backend/__init__.py

    events:

      - http:
          path: api/people
          method: post
          cors:
            origins:
              - "*"
            headers:
              - Content-Type
              - Authorization

      - http:
          path: api/people/{id}
          method: put
          cors:
            origins:
              - "*"
            headers:
              - Content-Type
              - Authorization

      - http:
          path: api/people/{id}
          method: delete
          cors:
            origins:
              - "*"
            headers:
              - Content-Type
              - Authorization

      - http:
          path: api/import
          method: post
          cors:
            origins:
              - "*"
            headers:
              - Content-Type
              - Authorization


  crudHandler:
    handler: backend/crud_lambda.lambda_handler
    memorySize: 512

    package:
      patterns:
        - backend/crud_lambda.py
        - backend/import_lambda.py
        - backend/__init__.py

    events:

      - eventBridge:
          eventBus:
            Ref: YoloApiBus
          pattern:
            source:
              - yolo.people
            detail-type:
              - person.created
              - person.updated
              - person.deleted
              - people.imported


  healthHandler:
    handler: backend/health_lambda.lambda_handler
    memorySize: 128

    package:
      patterns:
        - backend/health_lambda.py
        - backend/__init__.py

    events:

      - http:
          path: api/health
          method: get
          cors:
            origins:
              - "*"
            headers:
              - Content-Type


resources:

  Resources:

    YoloApiBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: yolo-api-bus


    PeopleTable:
      Type: AWS::DynamoDB::Table
      Properties:

        TableName: case_yolo
        BillingMode: PAY_PER_REQUEST

        AttributeDefinitions:

          - AttributeName: id
            AttributeType: S

          - AttributeName: email
            AttributeType: S

          - AttributeName: tipo
            AttributeType: S


        KeySchema:

          - AttributeName: id
            KeyType: HASH


        GlobalSecondaryIndexes:

          - IndexName: EmailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL


          - IndexName: TipoIndex
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
            Projection:
              ProjectionType: ALL


  Outputs:

    ApiGatewayUrl:
      Description: URL base do API Gateway
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: ApiGatewayRestApi
            - ".execute-api."
            - ${self:provider.region}
            - ".amazonaws.com/dev"


    EventBusArn:
      Value:
        Fn::GetAtt:
          - YoloApiBus
          - Arn


    DynamoTableName:
      Value: case_yolo