service: yolo-coliving-api

package:
  individually: true
  patterns:
    - "!node_modules/"
    - "!src/"
    - "!.env*"
    - "!*.md"
    - "!dockerfile*"
    - "!docker-compose*"
    - "!package*.json"
    - "!tsconfig*"
    - "!vite.config*"
    - "!index.html"
    - "!app.py"
    - "!requirements.txt"
    - "!__pycache__/"
    - "!*.pyc"
    - "!lambda_function.py"
    - "!handler.py"

provider:
  name: aws
  runtime: python3.11
  region: us-east-2
  environment:
    DYNAMODB_TABLE_NAME: ${env:DYNAMODB_TABLE_NAME}
    EVENT_BUS_NAME: ${env:EVENT_BUS_NAME}
    API_YOLO: ${env:API_YOLO}
    LOCAL_SYNC: ${env:LOCAL_SYNC}

  iam:
    role:
      statements:

        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/case_yolo"
            - Fn::Sub: "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/case_yolo/index/*"

        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - Fn::Sub: "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${self:provider.environment.EVENT_BUS_NAME}"

        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"

functions:

  readerHandler:
    handler: backend/reader_lambda.lambda_handler
    memorySize: 256

    package:
      patterns:
        - "backend/__init__.py"
        - "backend/reader_lambda.py"
        - "backend/import_lambda.py"

    events:

      - http:
          path: api/people
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false

      - http:
          path: api/people/{id}
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false

  publisherHandler:
    handler: backend/publisher_lambda.lambda_handler
    memorySize: 256

    package:
      patterns:
        - "backend/__init__.py"
        - "backend/publisher_lambda.py"
        - "backend/crud_lambda.py"
        - "backend/import_lambda.py"

    events:

      - http:
          path: api/people
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false

      - http:
          path: api/people/{id}
          method: put
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false

      - http:
          path: api/people/{id}
          method: delete
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false

      - http:
          path: api/import
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
              - X-Amz-Date
              - X-Api-Key
              - X-Amz-Security-Token
            allowCredentials: false

  crudHandler:
    handler: backend/crud_lambda.lambda_handler
    memorySize: 512

    package:
      patterns:
        - "backend/__init__.py"
        - "backend/crud_lambda.py"
        - "backend/import_lambda.py"

    events:

      - eventBridge:
          eventBus: !Ref PeopleBus
          pattern:
            source:
              - yolo.people
            detail-type:
              - person.created
              - person.updated
              - person.deleted
              - people.imported

  healthHandler:
    handler: backend/health_lambda.lambda_handler
    memorySize: 128

    package:
      patterns:
        - "backend/__init__.py"
        - "backend/health_lambda.py"

    events:

      - http:
          path: api/health
          method: get
          cors:
            origin: '*'
            headers:
              - Content-Type
              - Authorization
            allowCredentials: false

resources:

  Resources:

    PeopleBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:provider.environment.EVENT_BUS_NAME}
      DeletionPolicy: Retain

    PeopleTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_TABLE_NAME}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
          - AttributeName: tipo
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: EmailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: TipoIndex
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
            Projection:
              ProjectionType: ALL
      DeletionPolicy: Retain

  Outputs:

    ApiGatewayUrl:
      Description: URL base do API Gateway (inclui stage)
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: ApiGatewayRestApi
            - ".execute-api."
            - Ref: AWS::Region
            - ".amazonaws.com/"
            - !Sub "${sls:stage}"

    DynamoTableName:
      Value: ${self:provider.environment.DYNAMODB_TABLE_NAME}

    EventBusArn:
      Value:
        Fn::Sub: "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/${self:provider.environment.EVENT_BUS_NAME}"