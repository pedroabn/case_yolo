# serverless.yml
service: yolo-coliving-api

package:
  individually: true
  patterns:
    - "!node_modules/**"
    - "!src/**"
    - "!.env*"
    - "!*.md"
    - "!dockerfile*"
    - "!docker-compose*"
    - "!package*.json"
    - "!tsconfig*"
    - "!vite.config*"
    - "!index.html"
    - "!app.py"

provider:
  name: aws
  runtime: python3.11
  region: us-east-2
  environment:
    DYNAMODB_TABLE_NAME: case_yolo
    EVENT_BUS_NAME: ${env:EVENT_BUS_NAME}
    API_YOLO: ${env:API_YOLO}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [PeopleTable, Arn]
            - Fn::Join:
                - "/"
                - - Fn::GetAtt: [PeopleTable, Arn]
                  - "index/*"
        - Effect: Allow
          Action:
            - events:PutEvents
          Resource:
            - Fn::GetAtt: [PeopleBus, Arn]
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "*"

functions:
  # GET — leitura síncrona, com auto-import se tabela vazia
  readerHandler:
    handler: backend/reader_lambda.lambda_handler
    timeout: 30
    package:
      patterns:
        - "backend/__init__.py"
        - "backend/reader_lambda.py"
        - "backend/import_lambda.py"
    events:
      - http:
          path: api/people
          method: get
          cors: true
      - http:
          path: api/people/{id}
          method: get
          cors: true

  # POST / PUT / DELETE — publica evento no EventBridge, retorna 202
  publisherHandler:
    handler: backend/publisher_lambda.lambda_handler
    package:
      patterns:
        - "backend/__init__.py"
        - "backend/publisher_lambda.py"
    events:
      - http:
          path: api/people
          method: post
          cors: true
      - http:
          path: api/people/{id}
          method: put
          cors: true
      - http:
          path: api/people/{id}
          method: delete
          cors: true
      - http:
          path: api/import
          method: post
          cors: true

  # Ativado pelo EventBridge — nunca chamado direto pelo API Gateway
  crudHandler:
    handler: backend/crud_lambda.lambda_handler
    timeout: 30
    package:
      patterns:
        - "backend/__init__.py"
        - "backend/crud_lambda.py"
        - "backend/import_lambda.py"
    events:
      - eventBridge:
          eventBus: !Ref PeopleBus
          pattern:
            source:
              - yolo.people
            detail-type:
              - person.created
              - person.updated
              - person.deleted
              - people.imported

  # Health check
  healthHandler:
    handler: backend/health_lambda.lambda_handler
    package:
      patterns:
        - "backend/__init__.py"
        - "backend/health_lambda.py"
    events:
      - http:
          path: api/health
          method: get
          cors: true

resources:
  Resources:
    PeopleBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: ${self:provider.environment.EVENT_BUS_NAME}

    PeopleTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DYNAMODB_TABLE_NAME}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: email
            AttributeType: S
          - AttributeName: tipo
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: EmailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: TipoIndex
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
            Projection:
              ProjectionType: ALL

  Outputs:
    ApiGatewayUrl:
      Description: "URL base do API Gateway"
      Value:
        Fn::Join:
          - ""
          - - "https://"
            - Ref: ApiGatewayRestApi
            - ".execute-api.${self:provider.region}.amazonaws.com/dev"
    DynamoTableName:
      Value: ${self:provider.environment.DYNAMODB_TABLE_NAME}
    EventBusArn:
      Value:
        Fn::GetAtt: [PeopleBus, Arn]