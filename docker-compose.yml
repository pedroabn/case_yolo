services:

  frontend:
    build:
      context: .
      dockerfile: dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
    env_file:
      - .env
  backend:
    build:
      context: .
      dockerfile: dockerfile.backend
    volumes:
      - ~/.aws:/root/.aws:ro
    env_file:
      - .env
    environment:
      - DYNAMODB_TABLE_NAME=${DYNAMODB_TABLE_NAME}
      - EVENT_BUS_NAME=${EVENT_BUS_NAME}
      - API_YOLO=${API_YOLO}
      - AWS_REGION=${AWS_REGION}
    profiles:
      - deploy
    networks:
      - yolo-network

networks:                           # REDE COMPARTILHADA
  yolo-network:
    driver: bridge