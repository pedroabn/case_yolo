service: yolo-coliving-api

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  environment:
    TABLE_NAME: ${self:service}-people-table
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [PeopleTable, Arn]
            - Fn::Join:
                - "/"
                - - Fn::GetAtt: [PeopleTable, Arn]
                  - "index/*"

functions:
  peopleHandler:
    handler: lambda_function.lambda_handler
    events:
      - http:
          path: people
          method: get
          cors: true
      - http:
          path: people/{id}
          method: get
          cors: true
      - http:
          path: people
          method: post
          cors: true
      - http:
          path: people/{id}
          method: put
          cors: true
      - http:
          path: people/{id}
          method: delete
          cors: true

  importHandler:
    handler: import_lambda.lambda_handler
    timeout: 30
    events:
      - http:
          path: import
          method: post
          cors: true

resources:
  Resources:
    PeopleTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: tipo
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        GlobalSecondaryIndexes:
          - IndexName: TipoIndex
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: EmailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL